# Transponder Configuration
# MIP-05 Push Notification Server

[server]
# Server's Nostr private key (hex format)
# Prefer private_key_file for production secret handling.
private_key = ""

# Alternative: path to a file containing the private key.
# Useful with Docker secrets or other mounted secret files.
# Generate with: transponder generate-keys --output /run/secrets/transponder_private_key
# private_key_file = "/run/secrets/transponder_private_key"

# Graceful shutdown timeout in seconds. Must be >= 1; a value of 0 makes the
# drain time out immediately and abandon in-flight push notifications.
# Increase this for environments with slow networks or high in-flight notification counts
shutdown_timeout_secs = 10

# Maximum size for the volatile event deduplication cache.
# Applies only when dedup_state_path is unset. Durable replay state retains all
# terminal event IDs inside dedup_retention_secs so restart/reconnect replay
# suppression covers the full NIP-59 subscription lookback window.
# Default: 100000
# max_dedup_cache_size = 100000

# Optional durable replay state for processed gift-wrap event IDs.
# Production deployments should set this to a writable path so restarts or
# relay reconnects do not re-dispatch the full NIP-59 2-day subscription
# backlog. Stores only public event IDs and timestamps; no tokens, keys,
# payloads, sender/recipient identities, or relay URLs.
# dedup_state_path = "/var/lib/transponder/dedup-events.log"

# Replay-state retention. Default covers the NIP-59 2-day timestamp tweak
# window plus tolerated future skew (172800 + 300 seconds).
# dedup_retention_secs = 173100

# Freshness bound for the unwrapped kind:446 notification rumor timestamp.
# Outer gift-wrap created_at is randomized by NIP-59 and is not a freshness
# signal. Set to 0 to disable this stateless bound.
# max_notification_age_secs = 3600
# max_notification_future_skew_secs = 300

# Maximum tracked keys for each rate limit cache (encrypted_token and device_token).
# This caps key count, not timestamp storage: worst-case timestamps per limiter
# are max_rate_limit_cache_size * (per_minute + per_hour), or ~524M Instant
# values with the defaults (~8.4 GB at 16 B/timestamp before overhead).
# Transponder has two such limiters.
# At capacity, new keys evict stale or below-limit entries when possible.
# If no safe eviction candidate exists, the new key is rate limited.
# Default: 100000 entries per cache
# max_rate_limit_cache_size = 100000

# Maximum encrypted tokens accepted in a single notification event.
# Default: 100
# max_tokens_per_event = 100

# Rate limit: max notifications per encrypted token per minute.
# Limits identical encrypted blobs to prevent replay attacks.
# Default: 240 (4 per second)
# encrypted_token_rate_limit_per_minute = 240

# Rate limit: max notifications per encrypted token per hour.
# Default: 5000
# encrypted_token_rate_limit_per_hour = 5000

# Rate limit: max notifications per device token per minute.
# Limits notifications to the same device to prevent spam.
# Default: 240 (4 per second)
# device_token_rate_limit_per_minute = 240

# Rate limit: max notifications per device token per hour.
# Default: 5000
# device_token_rate_limit_per_hour = 5000

# Maximum number of events processed concurrently.
# Bounds total in-flight gift-wrap unwrap (ECDH) work. The relay event loop
# admits up to this many events at once and applies back-pressure beyond it,
# draining the relay channel fast enough to avoid dropping legitimate events
# while capping CPU spent on asymmetric crypto under a flood.
# Default: 64
# max_concurrent_event_processing = 64

# Global pre-unwrap admission control (CPU-exhaustion DoS protection).
# Checked BEFORE the gift-wrap unwrap (ECDH), across ALL senders, using a single
# global budget. The server pubkey is public and gift wraps are sender-anonymous,
# so a cheap global throttle sheds floods before spending asymmetric-crypto
# cycles. Set well above legitimate single-server load.
# Default: 600 (10 per second)
# global_unwrap_rate_limit_per_minute = 600

# Global pre-unwrap admission control: max unwraps per hour across all senders.
# Default: 30000
# global_unwrap_rate_limit_per_hour = 30000

[relays]
# ClearNet relays to subscribe to
clearnet = [
    "wss://relay.eu.whitenoise.chat",
    "wss://relay.us.whitenoise.chat"
]

# Reject ws:// ClearNet relays by default. Enable only for local development
# with loopback/mock relays that cannot serve TLS.
allow_unencrypted_clearnet_relays = false

# Tor/onion relays (optional)
# Requires a binary built with: cargo build --features tor
onion = []

# Reconnection settings. reconnect_interval_secs must be between 1 and 300 seconds.
# max_reconnect_attempts caps retries after the initial failed attempt; 0 disables retries.
reconnect_interval_secs = 5
max_reconnect_attempts = 10

# Timeout in seconds to wait for at least one relay to connect during startup.
# Must be between 1 and 300 seconds: 0 times out immediately and never
# connects, and an unbounded value would hang startup when relays are down.
# Increase this for environments with slow networks or when using Tor relays.
# Default: 30
connection_timeout_secs = 30

[apns]
# Whether APNs (iOS) push notifications are enabled
enabled = false

# Token auth credentials (.p8 key from Apple Developer Console)
key_id = ""
team_id = ""
private_key_path = ""

# APNs environment: "production" or "sandbox"
environment = "production"

# iOS app bundle identifier
bundle_id = ""

# APNs payload mode: "silent" or "nse_prototype_alert"
# Keep production silent. Use nse_prototype_alert only for staging NSE prototype testing.
payload_mode = "silent"

[fcm]
# Whether FCM (Android) push notifications are enabled
enabled = false

# Path to Firebase service account JSON file
service_account_path = ""

# Firebase project ID (optional, can be read from service account)
project_id = ""

[health]
# Whether the health check HTTP server is enabled
enabled = true

# Address to bind the health check server to.
# Keep this on localhost unless an internal proxy, VPN, or load balancer needs
# access to the endpoint.
bind_address = "127.0.0.1:8080"

[metrics]
# Whether Prometheus metrics are enabled
# Metrics are exposed at /metrics on the health server port
enabled = true

[logging]
# Log level: "trace", "debug", "info", "warn", "error", "off"
level = "info"

# Log format: "json" (for production) or "pretty" (for development)
format = "json"

[glitchtip]
# Error and panic reporting to a GlitchTip (Sentry-compatible) instance.
# Reporting is OFF until a DSN is set. Prefer supplying the DSN via the
# TRANSPONDER_GLITCHTIP_DSN environment variable rather than committing it here.
# Only transponder's own ERROR events and panics are sent; no tokens, keys, or
# message content leave the process.
dsn = ""

# Deployment environment tag attached to every event.
environment = "production"

# Performance-trace sample rate (0.0..=1.0). 0.0 = errors only, which is
# recommended: transponder has no request transactions to trace.
# traces_sample_rate = 0.0
